services:

  api:
    build: .
    ports:
      - "8000:8000"       # your laptop's port 8000 connects to container's port 8000. Left side is your laptop, right side is the container.
    depends_on:           # start Redis first, then the API
      - redis
    environment:
      - REDIS_HOST=redis   # tells the API "Redis is at the hostname called redis"

  redis:
    image: redis:alpine   # use the official Redis image, no setup needed
    ports:
      - "6379:6379"       # Redis's default port, same as how 8000 is FastAPI's port




  # I used docker-compose to run the API and Redis as separate services that communicate with each other. The API container connects to Redis using the service hostname